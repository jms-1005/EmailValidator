<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Validator</title>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>

        


        $(document).ready(function(){

            // Example starter JavaScript for disabling form submissions if there are invalid fields
        (() => {
        'use strict'

        // Fetch all the forms we want to apply custom Bootstrap validation styles to
        const forms = document.querySelectorAll('.needs-validation')

        // Loop over them and prevent submission
        Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
            if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
            }

            form.classList.add('was-validated')
            }, false)
        })
        })()

            $("#btnEmailValid").click(function(){
               if(isValidEmail($("#email").val())){
                    $('.output').html('Valid Email');
               }
               else{
                    $('.output').html('Invalid Email');
               }
            })

            function isAlphabet(char) {
                return /^[A-Za-z]$/.test(char);
            }

            function isValid(str) {
                return !/\.{2,}/.test(str);
            }


            function isValidEmail(email){

                let splitEmail = email.split('@');
                console.log(splitEmail);
                
                if(splitEmail.length === 2){

                    let emailName = splitEmail[0];
                    let domainNameAndExt = splitEmail[1];
                    console.log(emailName, domainNameAndExt);

                    if(emailName.length > 0){

                        let domainSplit = domainNameAndExt.split('.');

                        if(domainSplit.length >= 2){
                            let domainName = domainSplit[0];
                            let domainExt = domainSplit[1];

                            if(domainName.length > 0){

                                if(domainExt.length >= 2){

                                    let lastLetterOfDomainExt = domainNameAndExt.charAt(domainNameAndExt.length-1);
                                    console.log('Last letter of domain', domainNameAndExt, lastLetterOfDomainExt);
                                    console.log(isAlphabet(lastLetterOfDomainExt));
                                    if(isAlphabet(lastLetterOfDomainExt)){

                                        if(isValid(domainNameAndExt)){
                                            return true;
                                        }
                                        else{
                                            return false;
                                        }

                                        return true;
                                    }
                                    else{
                                        return false;
                                    }

                                    return true;
                                }
                                else{
                                    return false;
                                }   

                                return true;
                            }
                            else{
                                return false;
                            }

                            return true;

                        }
                        else{
                            return false;
                        }

                        return true; // the email name has at least 1 char
                    }
                    else{
                        return false; // the email name has no characters
                    }


                    return true;

                }
                else{
                    return false; // Does not have only one @
                }
                
                
                


            }

            console.log('Email Validation Result:', isValidEmail("b@gmail.ca"));


        })

    </script>
</head>
<body class="container">

    <form novalidate class="needs-validation">

        <div class="mb-3">
            <label for="email" class="form-label">Enter your email address:</label>
            <input type="email" id="email" class="form-control" required> 
        </div>

        <div class="mb3">
            <div class="input-group">
                <span class="input-group-text">First and last name</span>
                <input type="text" aria-label="First name" class="form-control" required minlength="2">
                <input type="text" aria-label="Last name" class="form-control" required minlength="2">
            </div>
        </div>

        <button id="btnEmailValid" class="btn btn-primary mb-3 mt-3">Validate</button>

        <div class="output"></div>
    
    </form>
</body>
</html>
